name: reusable-release-ghcr-webhook

on:
  workflow_call:
    inputs:
      service:
        description: Standardized deploy service key
        required: true
        type: string
      image_name:
        description: GHCR image repository name
        required: true
        type: string
      docker_context:
        description: Docker build context
        required: false
        default: .
        type: string
      dockerfile:
        description: Dockerfile path
        required: false
        default: Dockerfile
        type: string
      build_args:
        description: Optional newline-delimited docker build args
        required: false
        default: ""
        type: string
      use_node_auth_token:
        description: Whether to inject NODE_AUTH_TOKEN into docker build args
        required: false
        default: false
        type: boolean
      concurrency_group:
        description: Workflow concurrency group
        required: true
        type: string
      environment:
        description: Deployment environment
        required: false
        default: production
        type: string
    secrets:
      ALIYUN_DEPLOY_WEBHOOK_URL:
        required: true
      ALIYUN_DEPLOY_WEBHOOK_SECRET:
        required: true
      GH_PACKAGES_READ_TOKEN:
        required: false

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ inputs.concurrency_group }}
  cancel-in-progress: false

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.export.outputs.image_ref }}
      image_digest: ${{ steps.build.outputs.digest }}
      commit_sha: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image owner
        id: vars
        run: |
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare build args
        id: build_args
        env:
          INPUT_BUILD_ARGS: ${{ inputs.build_args }}
          USE_NODE_AUTH_TOKEN: ${{ inputs.use_node_auth_token }}
          GH_PACKAGES_READ_TOKEN: ${{ secrets.GH_PACKAGES_READ_TOKEN }}
          GH_FALLBACK_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo 'value<<EOF'
            if [ -n "$INPUT_BUILD_ARGS" ]; then
              printf '%s\n' "$INPUT_BUILD_ARGS"
            fi

            if [ "$USE_NODE_AUTH_TOKEN" = "true" ]; then
              token="$GH_PACKAGES_READ_TOKEN"
              if [ -z "$token" ]; then
                token="$GH_FALLBACK_TOKEN"
              fi
              printf 'NODE_AUTH_TOKEN=%s\n' "$token"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.docker_context }}
          file: ${{ inputs.dockerfile }}
          push: true
          build-args: ${{ steps.build_args.outputs.value }}
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/${{ inputs.image_name }}:main-latest
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/${{ inputs.image_name }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export image reference
        id: export
        run: |
          echo "image_ref=ghcr.io/${{ steps.vars.outputs.owner_lc }}/${{ inputs.image_name }}:sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"

  callback-aliyun-webhook:
    runs-on: ubuntu-latest
    needs: build-and-push-image
    environment: ${{ inputs.environment }}
    steps:
      - name: Callback deploy webhook
        env:
          WEBHOOK_URL: ${{ secrets.ALIYUN_DEPLOY_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.ALIYUN_DEPLOY_WEBHOOK_SECRET }}
          SERVICE: ${{ inputs.service }}
          ENVIRONMENT: ${{ inputs.environment }}
          IMAGE_REF: ${{ needs.build-and-push-image.outputs.image_ref }}
          IMAGE_DIGEST: ${{ needs.build-and-push-image.outputs.image_digest }}
          COMMIT_SHA: ${{ needs.build-and-push-image.outputs.commit_sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          payload=$(cat <<JSON
          {
            "service": "${SERVICE}",
            "environment": "${ENVIRONMENT}",
            "repository": "${REPOSITORY}",
            "commit_sha": "${COMMIT_SHA}",
            "image_ref": "${IMAGE_REF}",
            "image_digest": "${IMAGE_DIGEST}"
          }
          JSON
          )

          signature="sha256=$(printf '%s' "$payload" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" -hex | sed 's/^.* //')"

          curl -fsS -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: $signature" \
            -H "X-IterLife-Event: app.deploy" \
            --data "$payload"
