name: iterlife-idaas

services:
  iterlife-idaas-api:
    image: ${RUNTIME_API_IMAGE_NAME:-iterlife-idaas-api:prod}
    container_name: iterlife-idaas-api
    env_file:
      - ${BACKEND_ENV_FILE:-/apps/config/iterlife-idaas/backend.env}
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      JAVA_TOOL_OPTIONS: -Duser.timezone=${TZ:-Asia/Shanghai} -Djdk.http.auth.tunneling.disabledSchemes=
      APP_LOG_DIR: /apps/logs/iterlife-idaas/api
      APP_LOG_FILE_PREFIX: iterlife-idaas-api
      APP_LOG_RETENTION_DAYS: ${APP_LOG_RETENTION_DAYS:-30}
      APP_LOG_TOTAL_SIZE_CAP: ${APP_LOG_TOTAL_SIZE_CAP:-2GB}
    restart: unless-stopped
    volumes:
      - /apps/logs/iterlife-idaas/api:/apps/logs/iterlife-idaas/api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${API_BIND_HOST:-127.0.0.1}:${API_PORT:-18280}:8088"
